<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Catan Board Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Roboto', sans-serif;
            user-select: none;
        }
        .font-game { font-family: 'Fredoka One', cursive; }
        .btn-side {
            background: linear-gradient(180deg, #ffca28, #f57f17);
            border: 2px solid #5d4037;
            box-shadow: 0 4px 0 #5d4037;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-side:active { transform: translateY(4px); box-shadow: 0 0 0 #5d4037; }
        .btn-side:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-action {
            background: linear-gradient(180deg, #ffca28, #f57f17);
            border: 2px solid #5d4037;
            box-shadow: 0 3px 0 #5d4037;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-action:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 0 0 #5d4037; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-action.active { background: linear-gradient(180deg, #66bb6a, #2e7d32); border-color: #1b5e20; box-shadow: 0 3px 0 #1b5e20; }
        .glow-current { box-shadow: 0 0 15px 3px rgba(255,215,0,0.7), 0 4px 6px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="w-screen h-screen relative">

    <!-- 3D Canvas -->
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>

    <!-- UI Overlay -->
    <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4">

        <!-- Top: Players Bar -->
        <div id="players-bar" class="flex justify-center items-start space-x-2 w-full mt-2 pointer-events-auto flex-wrap">
        </div>

        <!-- Middle Area -->
        <div class="flex-1 flex justify-between items-end pb-16 pointer-events-none">
            <!-- Left Side Buttons -->
            <div class="flex flex-col space-y-2 pointer-events-auto">
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Chat not implemented yet')">&#x1F4AC;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Emotes not implemented yet')">&#x1F642;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="doProposeTradeOffer()">&#x1F91D;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Stats not implemented yet')">&#x1F4CA;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Info not implemented yet')">&#x2139;&#xFE0F;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Rules not implemented yet')">&#x1F4D6;</button>
                <button class="btn-side w-12 h-10 rounded flex items-center justify-center text-xl" onclick="showToast('Settings not implemented yet')">&#x2699;&#xFE0F;</button>
            </div>

            <!-- Right Side: Action Buttons -->
            <div class="flex flex-col items-end space-y-2 pointer-events-auto">
                <div id="game-status" class="bg-black/80 text-white text-xs font-bold px-3 py-1.5 rounded-lg border border-yellow-700 mb-1"></div>
                <div id="action-buttons" class="flex flex-col space-y-2 items-end"></div>
            </div>
        </div>

        <!-- Bottom: Resource Bar -->
        <div class="flex justify-center w-full pb-2 pointer-events-auto">
            <div id="resource-bar" class="bg-black/90 border-2 border-red-800 shadow-[0_0_15px_rgba(200,49,52,0.6)] rounded-full px-6 py-2 flex items-center space-x-6">
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2 pointer-events-none"></div>

    <!-- Create Game Dialog -->
    <div id="create-game-dialog" class="fixed inset-0 bg-black/85 flex items-center justify-center z-50">
        <div class="bg-[#3e2723] border-2 border-yellow-700 rounded-xl p-6 w-[420px] shadow-2xl">
            <h2 class="font-game text-yellow-400 text-2xl text-center mb-4">New Game</h2>
            <div id="player-inputs" class="space-y-3">
                <div class="flex items-center space-x-2">
                    <span class="text-white font-bold w-6">1.</span>
                    <input type="text" class="flex-1 px-3 py-1.5 rounded bg-[#5d4037] text-white border border-yellow-800 focus:border-yellow-400 outline-none" placeholder="Player name" value="Alice">
                    <select class="px-2 py-1.5 rounded bg-[#5d4037] text-white border border-yellow-800">
                        <option value="red">Red</option><option value="blue">Blue</option><option value="white">White</option><option value="orange">Orange</option>
                    </select>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="text-white font-bold w-6">2.</span>
                    <input type="text" class="flex-1 px-3 py-1.5 rounded bg-[#5d4037] text-white border border-yellow-800 focus:border-yellow-400 outline-none" placeholder="Player name" value="Bob">
                    <select class="px-2 py-1.5 rounded bg-[#5d4037] text-white border border-yellow-800">
                        <option value="blue" selected>Blue</option><option value="red">Red</option><option value="white">White</option><option value="orange">Orange</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between mt-4">
                <button onclick="addPlayerInput()" class="btn-action px-3 py-1.5 rounded text-sm font-bold text-[#3e2723]">+ Add Player</button>
                <button onclick="startGame()" class="btn-action px-6 py-2 rounded font-bold text-[#3e2723] text-lg">Start Game</button>
            </div>
            <div class="mt-4 text-center">
                <p class="text-yellow-600 text-xs">or join existing:</p>
                <div class="flex space-x-1 mt-1">
                    <input type="text" id="join-game-id" class="flex-1 px-2 py-1 rounded bg-[#5d4037] text-white border border-yellow-800 text-xs" placeholder="game_id">
                    <input type="text" id="join-token" class="flex-1 px-2 py-1 rounded bg-[#5d4037] text-white border border-yellow-800 text-xs" placeholder="player_token">
                    <button onclick="joinGame()" class="btn-action px-2 py-1 rounded text-xs font-bold text-[#3e2723]">Join</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Discard Dialog -->
    <div id="discard-dialog" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-[#3e2723] border-2 border-red-700 rounded-xl p-6 w-[400px] shadow-2xl">
            <h2 class="font-game text-red-400 text-xl text-center mb-2">Discard Resources</h2>
            <p id="discard-info" class="text-white text-sm text-center mb-3"></p>
            <div id="discard-inputs" class="space-y-2"></div>
            <button onclick="submitDiscard()" class="btn-action w-full mt-4 py-2 rounded font-bold text-[#3e2723]">Confirm Discard</button>
        </div>
    </div>

    <!-- Robber Victim Dialog -->
    <div id="victim-dialog" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-[#3e2723] border-2 border-yellow-700 rounded-xl p-6 w-[350px] shadow-2xl">
            <h2 class="font-game text-yellow-400 text-xl text-center mb-3">Steal From</h2>
            <div id="victim-buttons" class="space-y-2"></div>
            <button onclick="hideVictimDialog()" class="text-yellow-600 text-sm mt-3 block mx-auto">Skip (no steal)</button>
        </div>
    </div>

    <script>
    // ======== CONFIGURATION & CONSTANTS ========
    const API_BASE = 'http://localhost:8000';
    const WS_BASE = 'ws://localhost:8000';

    const TILE_AXIAL = {
        0:{q:0,r:-2},  1:{q:1,r:-2},  2:{q:2,r:-2},
        3:{q:-1,r:-1}, 4:{q:0,r:-1},  5:{q:1,r:-1},  6:{q:2,r:-1},
        7:{q:-2,r:0},  8:{q:-1,r:0},  9:{q:0,r:0},   10:{q:1,r:0},  11:{q:2,r:0},
        12:{q:-2,r:1}, 13:{q:-1,r:1}, 14:{q:0,r:1},   15:{q:1,r:1},
        16:{q:-2,r:2}, 17:{q:-1,r:2}, 18:{q:0,r:2}
    };

    const RESOURCE_MAP = {
        'BRICK':'brick', 'LUMBER':'wood', 'WOOL':'sheep',
        'GRAIN':'wheat', 'ORE':'ore', 'DESERT':'desert'
    };

    const RESOURCE_LABELS = {
        'BRICK':'Brick', 'LUMBER':'Wood', 'WOOL':'Sheep',
        'GRAIN':'Wheat', 'ORE':'Ore'
    };

    const RESOURCE_COLORS = {
        'BRICK':'#bd5a36', 'LUMBER':'#3b5e2b', 'WOOL':'#8ebd3f',
        'GRAIN':'#f0c24f', 'ORE':'#82858c'
    };

    const RESOURCE_ORDER = ['LUMBER','BRICK','WOOL','GRAIN','ORE'];

    const PLAYER_COLORS = {
        'red':'#c83134', 'blue':'#1a6b9c', 'white':'#e0e0e0', 'orange':'#d67a1c',
        'green':'#2e7d32', 'purple':'#8a217c'
    };
    const PLAYER_COLORS_DARK = {
        'red':'#811818', 'blue':'#0c3652', 'white':'#999999', 'orange':'#7a430d',
        'green':'#1b5e20', 'purple':'#5a1551'
    };
    const PLAYER_COLORS_MID = {
        'red':'#a72323', 'blue':'#124d73', 'white':'#bbbbbb', 'orange':'#a85e13',
        'green':'#266b24', 'purple':'#6e1a63'
    };

    // ======== STATE MANAGEMENT ========
    const GameState = {
        gameId: null,
        playerToken: null,
        myPlayerId: null,
        version: 0,
        publicState: null,
        privateState: null,
        vertexPositions: {},
        edgePositions: {},
        tilePositions: {},
        tileNumbers: {},
        playerMap: {},
        interactionMode: 'none',
        pendingRobberTileId: null,
        requestSeq: 0,
    };

    function playersList() {
        return GameState.publicState?.players || [];
    }

    function updateState(envelope) {
        if (!envelope) return;
        GameState.publicState = envelope.public_state;
        GameState.privateState = envelope.private_state || null;
        GameState.version = envelope.version;
        if (GameState.privateState) {
            GameState.myPlayerId = GameState.privateState.player_id;
        }
        GameState.playerMap = {};
        if (GameState.publicState && GameState.publicState.players) {
            for (const p of GameState.publicState.players) {
                GameState.playerMap[p.id] = p;
            }
        }
        GameState.interactionMode = 'none';
        rebuildScene();
        updateUI();
        checkPendingModals();
    }

    // ======== API CLIENT ========
    async function apiCreateGame(players) {
        const res = await fetch(`${API_BASE}/games`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({players})
        });
        if (!res.ok) { showToast('Failed to create game: ' + res.statusText, 'error'); return null; }
        return await res.json();
    }

    async function apiGetState(gameId, playerToken) {
        const url = playerToken
            ? `${API_BASE}/games/${gameId}/state?player_token=${playerToken}`
            : `${API_BASE}/games/${gameId}/state`;
        const res = await fetch(url);
        if (!res.ok) { showToast('Failed to get state: ' + res.statusText, 'error'); return null; }
        return await res.json();
    }

    async function apiCommand(command, payload = {}) {
        if (!GameState.gameId || !GameState.playerToken) return null;
        GameState.requestSeq += 1;
        const body = {
            player_token: GameState.playerToken,
            command: command,
            payload: payload,
            expected_version: GameState.version,
            request_id: `${Date.now()}-${GameState.requestSeq}-${command}`
        };
        try {
            const res = await fetch(`${API_BASE}/games/${GameState.gameId}/commands`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            if (res.status === 401) { showToast('Invalid player token', 'error'); return null; }
            if (res.status === 404) { showToast('Game not found', 'error'); return null; }
            const data = await res.json();
            if (!data.accepted) {
                if (data.reason && data.reason.includes('Version mismatch')) {
                    const freshState = await apiGetState(GameState.gameId, GameState.playerToken);
                    if (freshState) updateState(freshState);
                    showToast('State refreshed, try again', 'warning');
                } else {
                    showToast(data.reason || 'Command rejected', 'error');
                }
                return data;
            }
            if (data.state) updateState(data.state);
            return data;
        } catch (e) {
            showToast('Network error: ' + e.message, 'error');
            return null;
        }
    }

    // ======== WEBSOCKET ========
    let ws = null;

    function connectWebSocket(gameId) {
        if (ws) { ws.onclose = null; ws.close(); }
        ws = new WebSocket(`${WS_BASE}/ws/games/${gameId}`);
        ws.onopen = () => {
            if (GameState.playerToken) {
                ws.send(JSON.stringify({type:'snapshot', payload:{player_token: GameState.playerToken}}));
            }
        };
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'snapshot') {
                updateState(msg.payload);
            } else if (msg.type === 'game_state_updated') {
                apiGetState(GameState.gameId, GameState.playerToken).then(state => {
                    if (state) updateState(state);
                });
            } else if (msg.type === 'error') {
                showToast(msg.payload.message || 'WebSocket error', 'error');
            }
        };
        ws.onclose = () => {
            setTimeout(() => connectWebSocket(gameId), 3000);
        };
    }

    // ======== TOAST NOTIFICATIONS ========
    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const colors = {info:'bg-blue-800 border-blue-600', error:'bg-red-900 border-red-600', warning:'bg-yellow-800 border-yellow-600', success:'bg-green-800 border-green-600'};
        const el = document.createElement('div');
        el.className = `${colors[type] || colors.info} border text-white text-sm px-4 py-2 rounded-lg shadow-lg pointer-events-auto opacity-0 transition-opacity duration-300`;
        el.textContent = message;
        container.appendChild(el);
        requestAnimationFrame(() => el.style.opacity = '1');
        setTimeout(() => {
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 300);
        }, 3500);
    }

    // ======== THREE.JS SCENE SETUP ========
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87ceeb');
    scene.fog = new THREE.FogExp2('#87ceeb', 0.0025);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 55, 65);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 30;
    controls.maxDistance = 150;
    controls.target.set(0, 0, 0);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 0.9);
    dirLight.position.set(30, 50, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0xddeeff, 0.3);
    fillLight.position.set(-30, 20, -20);
    scene.add(fillLight);

    // Materials
    const textureLoader = new THREE.TextureLoader();
    function loadRepeatingTexture(path, repeatX, repeatY) {
        const texture = textureLoader.load(path);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(repeatX, repeatY);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.encoding = THREE.sRGBEncoding;
        return texture;
    }

    function loadClampedTexture(path) {
        const texture = textureLoader.load(path);
        texture.wrapS = THREE.ClampToEdgeWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.encoding = THREE.sRGBEncoding;
        return texture;
    }

    const oceanPlaneTexture = loadRepeatingTexture('assets/textures/ocean-water.png', 12, 12);
    const hexTexturePaths = {
        wood: 'assets/textures/hex-wood.png',
        sheep: 'assets/textures/hex-sheep.png',
        wheat: 'assets/textures/hex-wheat.png',
        brick: 'assets/textures/hex-brick.png',
        ore: 'assets/textures/hex-ore.png',
        desert: 'assets/textures/hex-desert.png'
    };
    const hexTextures = {};
    for (const [key, path] of Object.entries(hexTexturePaths)) {
        hexTextures[key] = loadRepeatingTexture(path, 1, 1);
    }
    const hexTransitionTexture = loadClampedTexture('assets/textures/hex-transition-sand-ring.png');
    const portPlankTexture = loadRepeatingTexture('assets/textures/port-plank-wood.png', 2, 1);
    const portPoleTexture = loadRepeatingTexture('assets/textures/port-pole-wood.png', 1, 2);
    const portCrateTexture = loadRepeatingTexture('assets/textures/crate.png', 1, 1);
    const boatHullTexture = loadRepeatingTexture('assets/textures/boat-hull-painted-wood.png', 2, 1);
    const boatDeckTexture = loadRepeatingTexture('assets/textures/boat-deck-light-wood.png', 2, 1);
    const boatSailTexture = loadRepeatingTexture('assets/textures/boat-sail-canvas.png', 1, 1);
    const hexColors = {
        wood:'#3b5e2b', sheep:'#8ebd3f', wheat:'#f0c24f',
        brick:'#bd5a36', ore:'#82858c', desert:'#d6c596'
    };
    function createHexSideTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#d6b171');
        gradient.addColorStop(0.45, '#b9874c');
        gradient.addColorStop(1, '#7c5432');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let seed = 42;
        function random() {
            seed = (seed * 1664525 + 1013904223) >>> 0;
            return seed / 4294967296;
        }

        for (let i = 0; i < 180; i++) {
            const x = random() * canvas.width;
            const y = random() * canvas.height;
            const w = 12 + random() * 48;
            const h = 1 + random() * 5;
            const alpha = 0.05 + random() * 0.16;
            ctx.fillStyle = random() > 0.5
                ? `rgba(255, 224, 143, ${alpha})`
                : `rgba(84, 51, 28, ${alpha})`;
            ctx.fillRect(x, y, w, h);
        }

        ctx.strokeStyle = 'rgba(255, 229, 164, 0.22)';
        ctx.lineWidth = 3;
        for (let y = 18; y < canvas.height; y += 28) {
            ctx.beginPath();
            for (let x = 0; x <= canvas.width; x += 16) {
                const wave = Math.sin((x + y) * 0.035) * 3;
                if (x === 0) ctx.moveTo(x, y + wave);
                else ctx.lineTo(x, y + wave);
            }
            ctx.stroke();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        texture.repeat.set(2, 1);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.encoding = THREE.sRGBEncoding;
        return texture;
    }

    const hexSideTexture = createHexSideTexture();
    const hexSideMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: hexSideTexture,
        roughness: 0.9,
        metalness: 0.0,
        flatShading: true
    });
    const hexCapMat = new THREE.MeshStandardMaterial({
        color: '#c9a66f',
        roughness: 0.9,
        metalness: 0.0,
        flatShading: true
    });
    const hexBodyMaterials = [hexSideMat, hexCapMat, hexCapMat];
    const portWoodMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: portPlankTexture,
        roughness: 0.72,
        metalness: 0.0
    });
    const portDarkWoodMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: portPoleTexture,
        roughness: 0.78,
        metalness: 0.0
    });
    const portStoneMat = new THREE.MeshStandardMaterial({ color: '#a99678', roughness: 0.85, metalness: 0.0 });
    const portCrateMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: portCrateTexture,
        roughness: 0.75,
        metalness: 0.0
    });
    const boatHullMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: boatHullTexture,
        roughness: 0.58,
        metalness: 0.0
    });
    const boatTrimMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: boatDeckTexture,
        roughness: 0.5,
        metalness: 0.0
    });
    const boatCabinMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: boatDeckTexture,
        roughness: 0.65,
        metalness: 0.0
    });
    const boatFlagMat = new THREE.MeshStandardMaterial({ color: '#c45a3f', roughness: 0.55, metalness: 0.0, side: THREE.DoubleSide });
    const sailMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: boatSailTexture,
        roughness: 0.45,
        metalness: 0.0,
        side: THREE.DoubleSide
    });
    const hexTopMaterials = {};
    for (const [key, hex] of Object.entries(hexColors)) {
        const texture = hexTextures[key];
        hexTopMaterials[key] = new THREE.MeshStandardMaterial({
            color: texture ? '#ffffff' : hex,
            map: texture || null,
            roughness: 0.8,
            metalness: 0.0,
            polygonOffset: true,
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1,
            side: THREE.DoubleSide
        });
    }
    const hexTransitionMat = new THREE.MeshStandardMaterial({
        color: '#ffffff',
        map: hexTransitionTexture,
        roughness: 0.85,
        metalness: 0.0,
        transparent: true,
        alphaTest: 0.08,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -2,
        polygonOffsetUnits: -2,
        side: THREE.DoubleSide
    });

    // Ocean plane (animated waves)
    const oceanGeo = new THREE.PlaneGeometry(800, 800, 60, 60);
    oceanGeo.rotateX(-Math.PI / 2);
    const oceanMat = new THREE.MeshStandardMaterial({
        color:'#8ed9eb',
        map: oceanPlaneTexture,
        roughness:0.35,

    // ======== TREE (FOREST) GEOMETRY & MATERIALS ========

    // --- Trunk materials (a couple of bark shades) ---
    const trunkBarkDarkMat = new THREE.MeshStandardMaterial({

    // Procedural leaf texture: seeded clusters of lighter "leaf" blobs over a
    // darker base, plus speckles and shadow pockets. Each foliage material gets
    // its own seeded variant so crowns don't look identical.
    function createLeafTexture(baseColor, highlightColor, shadowColor, seed) {
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');

        let s = (seed >>> 0) || 1;
        function rand() {
            s = (s + 0x9E3779B9) >>> 0;
            let t = s;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }

        // Base fill (the darker "between leaves" tone).
        ctx.fillStyle = baseColor;
        ctx.fillRect(0, 0, size, size);

        // Dark shadow pockets for depth between leaf clumps.
        for (let i = 0; i < 45; i++) {
            const cx = rand() * size;
            const cy = rand() * size;
            const r = 8 + rand() * 22;
            const alpha = 0.12 + rand() * 0.18;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(0, `rgba(0,0,0,${alpha})`);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
        }

        // Leaf clumps: many small soft circles of varied lightness.
        const clumpCount = 260;
        for (let i = 0; i < clumpCount; i++) {
            const cx = rand() * size;
            const cy = rand() * size;
            const r = 3 + rand() * 7;
            // Mix between base and highlight for each leaf.
            const t = 0.4 + rand() * 0.6;
            const alpha = 0.55 + rand() * 0.35;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(0, mixRGBA(highlightColor, baseColor, 1 - t, alpha));
            grad.addColorStop(0.6, mixRGBA(highlightColor, baseColor, (1 - t) * 0.5, alpha * 0.5));
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
        }

        // Darker shadow speckles so the canopy isn't uniformly bright.
        for (let i = 0; i < 180; i++) {
            const x = rand() * size;
            const y = rand() * size;
            const r = 1 + rand() * 1.8;
            ctx.fillStyle = mixRGBA(shadowColor, '#000000', 0.3, 0.35 + rand() * 0.3);
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.encoding = THREE.sRGBEncoding;
        texture.repeat.set(1, 1);
        return texture;
    }

    // Helper: mix two hex colors and return an rgba() string.
    function mixRGBA(colorA, colorB, tA, alpha) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        const r = Math.round(a.r * tA + b.r * (1 - tA));
        const g = Math.round(a.g * tA + b.g * (1 - tA));
        const bb = Math.round(a.b * tA + b.b * (1 - tA));
        return `rgba(${r},${g},${bb},${alpha})`;
    }
    function hexToRgb(hex) {
        const h = hex.replace('#', '');
        return {
            r: parseInt(h.slice(0, 2), 16),
            g: parseInt(h.slice(2, 4), 16),
            b: parseInt(h.slice(4, 6), 16)
        };
    }

    // Generate one leaf texture per foliage variant (color palette = base/highlight/shadow).

    // Deterministic RNG so trees don't jump between re-renders of the same tile.
    function mulberry32(seed) {
        let s = seed >>> 0;
        return function () {
            s = (s + 0x6D2B79F5) >>> 0;
            let t = s;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
    }

    function pickFoliageMat(rand) {

    // Tiny sapling to dot between larger trees.
    function buildSaplingTree(rand) {
        const group = new THREE.Group();
        const trunk = new THREE.Mesh(trunkSlimGeo, trunkMaterials[Math.floor(rand() * trunkMaterials.length)]);
        trunk.scale.y = 0.6;

    const treeBuilders = [
        { build: buildPineTree,     weight: 3 },
        { build: buildTallPineTree, weight: 2 },
        { build: buildCypressTree,  weight: 1 },
        { build: buildBroadleafTree, weight: 2 },
        { build: buildBirchTree,    weight: 1 },
        { build: buildBushyTree,    weight: 2 },
        { build: buildSaplingTree,  weight: 1 }
    ];
    const treeBuilderTotalWeight = treeBuilders.reduce((s, b) => s + b.weight, 0);
    function pickTreeBuilder(rand) {
        let r = rand() * treeBuilderTotalWeight;
        for (const b of treeBuilders) {
            r -= b.weight;
            if (r <= 0) return b.build;
        }
        return treeBuilders[0].build;
    }

    function createTreeMesh(scale, rand) {
        const group = pickTreeBuilder(rand)(rand);
        // Slight non-uniform scaling for more silhouette variety.
        const sx = scale * (0.92 + rand() * 0.16);
        const sy = scale * (0.92 + rand() * 0.22);
        const sz = scale * (0.92 + rand() * 0.16);
        group.scale.set(sx, sy, sz);
        // Tiny tilt so the trees don't all look soldier-straight.
        const tiltAmt = 0.06;
        group.rotation.x = (rand() - 0.5) * tiltAmt;
        group.rotation.z = (rand() - 0.5) * tiltAmt;
        return group;
    }

    // Builds a cluster of trees on top of a forest (wood) tile.
    function createForestCluster(tileId) {
        const cluster = new THREE.Group();
        // Use tile id as seed for reproducible placement.
        let seed = 1;
        if (typeof tileId === 'number') {
            seed = (tileId * 2654435761) >>> 0;
        } else if (typeof tileId === 'string') {
            for (let i = 0; i < tileId.length; i++) {
                seed = (Math.imul(seed, 31) + tileId.charCodeAt(i)) >>> 0;
            }
        }
        const rand = mulberry32(seed || 1);

        const treeCount = 22;
        const placed = [];
        // Keep trees away from the hex edges. The hex is pointy-top, so its
        // edges have inward normals at angles 60*i degrees and sit at a
        // distance `apothem = hexSize * cos(30deg)` from the center.
        const apothem = hexSize * Math.cos(Math.PI / 6);
        const edgeInset = 1.2;                   // world units to keep off the flat edges
        const maxEdgeDist = apothem - edgeInset; // max signed distance to any edge
        const maxRadius = hexSize - edgeInset;   // corner safety (corners are at `hexSize`)
        const minRadius = 0.0;
        const minSeparation = 0.95;

        function insideHexInset(x, z) {
            for (let i = 0; i < 6; i++) {
                const theta = (i * Math.PI) / 3; // 0, 60, 120, ... degrees
                const d = x * Math.cos(theta) + z * Math.sin(theta);
                if (d > maxEdgeDist || d < -maxEdgeDist) return false;
            }
            return true;
        }

        let attempts = 0;
        while (placed.length < treeCount && attempts < 600) {
            attempts++;
            const angle = rand() * Math.PI * 2;
            const radius = minRadius + rand() * (maxRadius - minRadius);
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            if (!insideHexInset(x, z)) continue;

            let tooClose = false;
            for (const p of placed) {
                const dx = p.x - x;
                const dz = p.z - z;
                if (dx * dx + dz * dz < minSeparation * minSeparation) {
                    tooClose = true;
                    break;
                }
            }
            if (tooClose) continue;

            const scale = 0.7 + rand() * 0.55;
            const tree = createTreeMesh(scale, rand);
            tree.position.set(x, 0, z);
            tree.rotation.y = rand() * Math.PI * 2;
            cluster.add(tree);
            placed.push({ x, z });
        }
        return cluster;
    }

    // ======== MOUNTAIN (ORE) GEOMETRY & MATERIALS ========
    // Low-poly faceted cones with snow caps, built on a shared palette of
    // rock shades so each ore tile reads as a small alpine ridge.

    // Procedural rock texture: seeded value-noise + a few darker striations and
    // bright speckles so flat-shaded facets still feel like stone under light.
    function createRockTexture(baseColor, seed) {
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Deterministic RNG so each material gets a different-but-stable pattern.
        let s = (seed >>> 0) || 1;
        function rand() {
            s = (s + 0x9E3779B9) >>> 0;
            let t = s;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }

        // Fill with the base color.
        ctx.fillStyle = baseColor;
        ctx.fillRect(0, 0, size, size);

        // Low-frequency mottling: scatter large-ish soft blobs in darker/lighter
        // shades to break up the flat color.
        const blobCount = 140;
        for (let i = 0; i < blobCount; i++) {
            const cx = rand() * size;
            const cy = rand() * size;
            const r = 10 + rand() * 38;
            const dark = rand() > 0.5;
            const alpha = 0.06 + rand() * 0.12;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(0, dark
                ? `rgba(0,0,0,${alpha})`
                : `rgba(255,255,255,${alpha})`);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
        }

        // Striations: a few thin dark streaks to read as rock strata.
        ctx.lineCap = 'round';
        for (let i = 0; i < 18; i++) {
            const y = rand() * size;
            const amp = 6 + rand() * 14;
            const phase = rand() * Math.PI * 2;
            const alpha = 0.08 + rand() * 0.12;
            ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
            ctx.lineWidth = 1 + rand() * 1.8;
            ctx.beginPath();
            for (let x = 0; x <= size; x += 8) {
                const yy = y + Math.sin(x * 0.04 + phase) * amp;
                if (x === 0) ctx.moveTo(x, yy);
                else ctx.lineTo(x, yy);
            }
            ctx.stroke();
        }

        // Tiny speckles (mineral glints / pebbles).
        for (let i = 0; i < 320; i++) {
            const x = rand() * size;
            const y = rand() * size;
            const bright = rand() > 0.65;
            const a = 0.15 + rand() * 0.35;
            ctx.fillStyle = bright ? `rgba(255,246,220,${a})` : `rgba(0,0,0,${a * 0.8})`;
            ctx.fillRect(x, y, 1 + Math.floor(rand() * 2), 1 + Math.floor(rand() * 2));
        }

        // Subtle cracks: short dark line segments.
        for (let i = 0; i < 28; i++) {
            const x = rand() * size;
            const y = rand() * size;
            const len = 8 + rand() * 22;
            const ang = rand() * Math.PI * 2;
            ctx.strokeStyle = `rgba(0,0,0,${0.18 + rand() * 0.2})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(ang) * len, y + Math.sin(ang) * len);
            ctx.stroke();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.encoding = THREE.sRGBEncoding;
        // The mountain geometry has a short vertical UV range (0 .. ~1) across
        // a tall mesh, so repeat vertically so strata look the right scale.
        texture.repeat.set(1.5, 2.2);
        return texture;
    }

    const rockTextureDark  = createRockTexture('#4b4e55', 101);
    const rockTextureMid   = createRockTexture('#6a6d74', 202);
    const rockTextureLight = createRockTexture('#8a8c92', 303);
    const rockTextureWarm  = createRockTexture('#746459', 404);

    const rockDarkMat = new THREE.MeshStandardMaterial({
        color: '#ffffff', map: rockTextureDark,
        roughness: 0.95, metalness: 0.0, flatShading: true
    });
    const rockMidMat = new THREE.MeshStandardMaterial({
        color: '#ffffff', map: rockTextureMid,
        roughness: 0.92, metalness: 0.0, flatShading: true
    });
    const rockLightMat = new THREE.MeshStandardMaterial({
        color: '#ffffff', map: rockTextureLight,
        roughness: 0.9, metalness: 0.0, flatShading: true
    });
    const rockWarmMat = new THREE.MeshStandardMaterial({
        color: '#ffffff', map: rockTextureWarm,
        roughness: 0.95, metalness: 0.0, flatShading: true
    });
    const snowMat = new THREE.MeshStandardMaterial({
        color: '#f3f4f7', roughness: 0.7, metalness: 0.0, flatShading: true
    });
    const rockMaterials = [rockDarkMat, rockMidMat, rockLightMat, rockWarmMat];

    // Shared mountain size specs. Actual peak geometries are generated per peak
    // so their bases can remain closed and flat while silhouettes vary.
    // shoulderFrac = shoulder ring height as fraction of total height.
    // shoulderScale = shoulder ring radius as fraction of base radius.
    // The snow cap sits on the shoulder ring, so cap.radius == shoulderRadius
    // and cap.height == (1 - shoulderFrac) * height. This guarantees the cap's
    // base matches the rock's cross-section at the same height.
    const mountainLargeSpec = { radius: 2.7, height: 4.05, shoulderFrac: 0.44, shoulderScale: 0.5 };
    const mountainMedSpec   = { radius: 2.15, height: 3.18, shoulderFrac: 0.44, shoulderScale: 0.5 };
    const mountainSmallSpec = { radius: 1.55, height: 2.25, shoulderFrac: 0.44, shoulderScale: 0.5 };
    const mountainTallSpec  = { radius: 2.1, height: 4.7,  shoulderFrac: 0.48, shoulderScale: 0.48 };
    const boulderGeo = new THREE.DodecahedronGeometry(0.5, 0);
    const boulderSmallGeo = new THREE.IcosahedronGeometry(0.34, 0);

    function createClosedMountainGeometry(spec, rand) {
        const sides = 6;
        const base = [];
        const shoulder = [];
        const vertices = [0, 0, 0]; // base center, used by the cap fan
        const uvs = [0.5, 0.5];

        // Precompute mean shoulder Y & radius used by the snow cap.
        const meanShoulderY = spec.height * spec.shoulderFrac;
        const meanShoulderR = spec.radius * spec.shoulderScale;

        for (let i = 0; i < sides; i++) {
            const angle = (-Math.PI / 6) + (i * Math.PI * 2) / sides;
            const baseRadius = spec.radius * (0.94 + rand() * 0.12);
            // Small per-vertex jitter around the mean so the silhouette stays
            // lively, but doesn't grow past the cap's footprint.
            const shoulderRadius = meanShoulderR * (0.92 + rand() * 0.12);
            const shoulderY = meanShoulderY * (0.96 + rand() * 0.08);
            const bx = Math.cos(angle) * baseRadius;
            const bz = Math.sin(angle) * baseRadius;
            const sx = Math.cos(angle + (rand() - 0.5) * 0.035) * shoulderRadius;
            const sz = Math.sin(angle + (rand() - 0.5) * 0.035) * shoulderRadius;
            // Cylindrical UVs: U goes around the mountain, V from base->apex.
            // Shoulder V matches shoulderFrac so the strata stay proportional.
            const u = i / sides;
            const baseIndex = vertices.length / 3;
            vertices.push(bx, 0, bz);
            uvs.push(u, 0);
            const shoulderIndex = vertices.length / 3;
            vertices.push(sx, shoulderY, sz);
            uvs.push(u, spec.shoulderFrac);
            base.push(baseIndex);
            shoulder.push(shoulderIndex);
        }

        // Apex position (slightly offset for personality). We return the offset
        // so the snow cap can share it and stay perfectly aligned with the tip.
        const apexOffsetX = (rand() - 0.5) * spec.radius * 0.08;
        const apexOffsetZ = (rand() - 0.5) * spec.radius * 0.08;
        const apexIndex = vertices.length / 3;
        vertices.push(apexOffsetX, spec.height, apexOffsetZ);
        uvs.push(0.5, 1);

        const indices = [];
        for (let i = 0; i < sides; i++) {
            const next = (i + 1) % sides;
            // Closed base cap.
            indices.push(0, base[i], base[next]);
            // Lower rock band.
            indices.push(base[i], shoulder[next], base[next]);
            indices.push(base[i], shoulder[i], shoulder[next]);
            // Upper peak faces.
            indices.push(shoulder[i], apexIndex, shoulder[next]);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return { geometry, apexOffsetX, apexOffsetZ };
    }

    function createSnowCapGeometry(spec, apexOffsetX, apexOffsetZ) {
        const sides = 6;
        // Match the mountain's shoulder so the cap base aligns with the rock,
        // then push the cap outward so it visibly wraps the rock edge
        // instead of fighting for the same surface (z-fighting).
        const capBaseRadius = spec.radius * spec.shoulderScale + 0.08;
        const capHeight = spec.height * (1 - spec.shoulderFrac);
        const vertices = [0, 0, 0];
        const uvs = [0.5, 0.5];
        // Perfectly regular hexagonal rim so the cap is visually concentric
        // with the mountain's shoulder (which uses the same angular step).
        for (let i = 0; i < sides; i++) {
            const angle = (-Math.PI / 6) + (i * Math.PI * 2) / sides;
            vertices.push(Math.cos(angle) * capBaseRadius, 0, Math.sin(angle) * capBaseRadius);
            uvs.push((Math.cos(angle) + 1) / 2, (Math.sin(angle) + 1) / 2);
        }
        const apexIndex = sides + 1;
        // Use the exact same apex offset as the mountain so the snow tip sits
        // on the rock tip, not beside it.
        vertices.push(apexOffsetX, capHeight, apexOffsetZ);
        uvs.push(0.5, 1);

        const indices = [];
        for (let i = 1; i <= sides; i++) {
            const next = i === sides ? 1 : i + 1;
            indices.push(0, i, next);
            indices.push(i, apexIndex, next);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return geometry;
    }

    // Builds a single mountain peak with an optional snow cap.
    function buildMountainPeak(rand, sizeVariant) {
        const group = new THREE.Group();

        let spec, baseScale;
        if (sizeVariant === 'large') {
            spec = mountainLargeSpec; baseScale = 1.0;
        } else if (sizeVariant === 'tall') {
            spec = mountainTallSpec; baseScale = 1.0;
        } else if (sizeVariant === 'small') {
            spec = mountainSmallSpec; baseScale = 1.0;
        } else {
            spec = mountainMedSpec; baseScale = 1.0;
        }

        const { geometry: peakGeo, apexOffsetX, apexOffsetZ } = createClosedMountainGeometry(spec, rand);
        const rockMat = rockMaterials[Math.floor(rand() * rockMaterials.length)];
        const peak = new THREE.Mesh(peakGeo, rockMat);
        const peakRotY = rand() * Math.PI * 2;
        peak.rotation.y = peakRotY;
        peak.castShadow = true; peak.receiveShadow = true;
        group.add(peak);

        // Snow cap (probability depends on size). The cap shares the mountain's
        // shoulder radius and apex offset, so it sits concentric with the rock
        // and its tip lands exactly on the mountain's tip.
        const snowChance = sizeVariant === 'small' ? 0.3 : 0.75;
        if (rand() < snowChance) {
            const capGeo = createSnowCapGeometry(spec, apexOffsetX, apexOffsetZ);
            const cap = new THREE.Mesh(capGeo, snowMat);
            // Seat the cap on the shoulder. Its base radius is slightly larger
            // than the rock's, so the snow wraps the rock edge without z-fight.
            cap.position.y = spec.height * spec.shoulderFrac;
            // Match peak rotation so facet edges align.
            cap.rotation.y = peakRotY;
            cap.castShadow = true; cap.receiveShadow = true;
            group.add(cap);
        }

        // Slight non-uniform scaling for silhouette variety.
        const sx = baseScale * (0.92 + rand() * 0.18);
        const sy = baseScale * (0.94 + rand() * 0.2);
        const sz = baseScale * (0.92 + rand() * 0.18);
        group.scale.set(sx, sy, sz);
        group.userData.apexY = spec.height * sy;

        return { group, disposableGeo: peakGeo };
    }

    function buildBoulder(rand, small) {
        const geo = small ? boulderSmallGeo : boulderGeo;
        const mat = rockMaterials[Math.floor(rand() * rockMaterials.length)];
        const m = new THREE.Mesh(geo, mat);
        const s = (small ? 0.45 : 0.62) + rand() * 0.35;
        m.scale.set(s * (0.8 + rand() * 0.5), s * (0.7 + rand() * 0.5), s * (0.8 + rand() * 0.5));
        m.rotation.set(rand() * Math.PI, rand() * Math.PI, rand() * Math.PI);
        m.position.y = s * 0.25;
        m.castShadow = true; m.receiveShadow = true;
        return m;
    }

    // Builds a cluster of mountains on top of an ore tile.
    function createMountainCluster(tileId) {
        const cluster = new THREE.Group();
        let seed = 7919;
        if (typeof tileId === 'number') {
            seed = (tileId * 2246822519) >>> 0;
        } else if (typeof tileId === 'string') {
            for (let i = 0; i < tileId.length; i++) {
                seed = (Math.imul(seed, 17) + tileId.charCodeAt(i)) >>> 0;
            }
        }
        const rand = mulberry32(seed || 1);

        // Stay off the flat hex edges (same approach as the forest).
        const apothem = hexSize * Math.cos(Math.PI / 6);
        const edgeInset = 1.6;
        const maxEdgeDist = apothem - edgeInset;
        const maxRadius = hexSize - edgeInset;

        function insideHexInset(x, z) {
            for (let i = 0; i < 6; i++) {
                const theta = (i * Math.PI) / 3;
                const d = x * Math.cos(theta) + z * Math.sin(theta);
                if (d > maxEdgeDist || d < -maxEdgeDist) return false;
            }
            return true;
        }

        const ridgeAngle = rand() * Math.PI * 2;
        const ridgeX = Math.cos(ridgeAngle);
        const ridgeZ = Math.sin(ridgeAngle);
        const sideX = -ridgeZ;
        const sideZ = ridgeX;
        const ridgeSlots = [
            { t: -2.65, side: -0.25, variant: 'small' },
            { t: -1.5, side: 0.25, variant: 'med' },
            { t: -0.2, side: -0.05, variant: 'tall' },
            { t: 1.15, side: -0.2, variant: 'large' },
            { t: 2.35, side: 0.22, variant: 'small' },
            { t: 0.85, side: 1.0, variant: 'small' }
        ];
        // Base radius for each variant (must stay in sync with the specs above).
        const variantRadius = {
            small: mountainSmallSpec.radius,
            med:   mountainMedSpec.radius,
            tall:  mountainTallSpec.radius,
            large: mountainLargeSpec.radius
        };
        // How much peaks are allowed to interpenetrate: at 1.0 their base rings
        // just touch, at <1 they overlap proportionally. 0.72 keeps the ridge
        // reading as one continuous mass without any peak sitting inside another.
        const overlapFactor = 0.72;

        const peakPositions = [];
        for (const slot of ridgeSlots) {
            const jitterT = (rand() - 0.5) * 0.35;
            const jitterSide = (rand() - 0.5) * 0.35;
            const x = ridgeX * (slot.t + jitterT) + sideX * (slot.side + jitterSide);
            const z = ridgeZ * (slot.t + jitterT) + sideZ * (slot.side + jitterSide);
            if (!insideHexInset(x, z)) continue;

            const slotRadius = variantRadius[slot.variant];
            // Reject if this peak's base would sit too deeply inside another peak.
            let overlapsExisting = false;
            for (const p of peakPositions) {
                const dx = p.x - x;
                const dz = p.z - z;
                const minDist = (p.radius + slotRadius) * overlapFactor;
                if (dx * dx + dz * dz < minDist * minDist) {
                    overlapsExisting = true;
                    break;
                }
            }
            if (overlapsExisting) continue;

            const { group: peak } = buildMountainPeak(rand, slot.variant);
            peak.position.set(x, 0, z);
            peak.rotation.y += ridgeAngle + (rand() - 0.5) * 0.5;
            cluster.add(peak);
            peakPositions.push({ x, z, radius: slotRadius });
        }

        // Scatter boulders in the gaps for extra texture.
        const boulderCount = 7 + Math.floor(rand() * 4);
        const placedBoulders = [];
        const boulderMinSep = 1.0;
        let bAttempts = 0;
        while (placedBoulders.length < boulderCount && bAttempts < 160) {
            bAttempts++;
            const angle = rand() * Math.PI * 2;
            const radius = rand() * maxRadius * 0.82;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            if (!insideHexInset(x, z)) continue;

            // Don't drop boulders right under a peak base (bases vary per variant).
            let onPeak = false;
            for (const p of peakPositions) {
                const dx = p.x - x, dz = p.z - z;
                const keepOut = (p.radius || 2.0) * 0.9;
                if (dx * dx + dz * dz < keepOut * keepOut) { onPeak = true; break; }
            }
            if (onPeak) continue;

            let tooClose = false;
            for (const p of placedBoulders) {
                const dx = p.x - x, dz = p.z - z;
                if (dx * dx + dz * dz < boulderMinSep * boulderMinSep) {
                    tooClose = true; break;
                }
            }
            if (tooClose) continue;

            const boulder = buildBoulder(rand, rand() < 0.5);
            boulder.position.x = x;
            boulder.position.z = z;
            cluster.add(boulder);
            placedBoulders.push({ x, z });
        }

        return cluster;
    }

    // ======== PASTURE (SHEEP) GEOMETRY & MATERIALS ========
    // Little sheep wander inside a hex-shaped fence. A tiny farmhouse sits
    // on the grass outside the fence to sell the pastoral vibe.

    // Sheep body parts, Gemini's proportions. Each sheep is uniformly scaled
    // down (see SHEEP_SCALE) so ~5 of them fit comfortably on a hex tile.
    const sheepBodyGeo = new THREE.BoxGeometry(2.2, 2.2, 3.0);
    const sheepHeadGeo = new THREE.BoxGeometry(0.7, 0.8, 1.2);
    const sheepEyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const sheepEarGeo = new THREE.BoxGeometry(0.15, 0.3, 0.15);
    const sheepLegGeo = new THREE.CylinderGeometry(0.12, 0.1, 1.2, 8);
    const SHEEP_SCALE = 0.28;

    // Materials
    const sheepWoolMat = new THREE.MeshStandardMaterial({
        color: '#f4f4f4', roughness: 1.0, metalness: 0.0, flatShading: true
    });
    const sheepWoolDarkMat = new THREE.MeshStandardMaterial({
        color: '#dcdcdc', roughness: 1.0, metalness: 0.0, flatShading: true
    });
    const sheepFaceMat = new THREE.MeshStandardMaterial({
        color: '#222222', roughness: 0.5, metalness: 0.0, flatShading: true
    });
    const sheepEyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    // Kept for backwards compat with the reusable-materials set; no longer used.
    const sheepDarkMat = sheepFaceMat;

    // Builds one sheep as a Group centered on origin, facing local +Z.
    // The returned Group is uniformly scaled so 1 world unit ~ one sheep body.
    function buildSheep(rand) {
        const sheep = new THREE.Group();
        const isDarkWool = rand() < 0.2;
        const woolMat = isDarkWool ? sheepWoolDarkMat : sheepWoolMat;

        // Body group (bounces vertically while walking).
        const bodyGroup = new THREE.Group();
        sheep.add(bodyGroup);

        const body = new THREE.Mesh(sheepBodyGeo, woolMat);
        body.position.y = 1.8;
        body.castShadow = true; body.receiveShadow = true;
        bodyGroup.add(body);

        // Head group (rotates down / lowers while grazing).
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 2.3, 1.6);
        bodyGroup.add(headGroup);

        const head = new THREE.Mesh(sheepHeadGeo, sheepFaceMat);
        head.castShadow = true;
        headGroup.add(head);

        const leftEye = new THREE.Mesh(sheepEyeGeo, sheepEyeMat);
        leftEye.position.set(-0.35, 0.2, 0.4);
        headGroup.add(leftEye);

        const rightEye = new THREE.Mesh(sheepEyeGeo, sheepEyeMat);
        rightEye.position.set(0.35, 0.2, 0.4);
        headGroup.add(rightEye);

        const leftEar = new THREE.Mesh(sheepEarGeo, sheepFaceMat);
        leftEar.position.set(-0.4, 0.2, -0.3);
        leftEar.rotation.z = Math.PI / 4;
        leftEar.castShadow = true;
        headGroup.add(leftEar);

        const rightEar = new THREE.Mesh(sheepEarGeo, sheepFaceMat);
        rightEar.position.set(0.4, 0.2, -0.3);
        rightEar.rotation.z = -Math.PI / 4;
        rightEar.castShadow = true;
        headGroup.add(rightEar);

        // Legs are direct children of the sheep group so they don't inherit
        // the body's bounce animation. Diagonal pairs swing in opposite phase
        // for a trotting gait (FL+BR, FR+BL).
        const legs = [];
        const legPositions = [
            [-0.5, 0.6,  0.9], // front-left
            [ 0.5, 0.6,  0.9], // front-right
            [-0.5, 0.6, -0.9], // back-left
            [ 0.5, 0.6, -0.9]  // back-right
        ];
        for (const [lx, ly, lz] of legPositions) {
            const leg = new THREE.Mesh(sheepLegGeo, sheepFaceMat);
            leg.position.set(lx, ly, lz);
            leg.castShadow = true;
            sheep.add(leg);
            legs.push({ mesh: leg, initialZ: lz });
        }

        sheep.scale.setScalar(SHEEP_SCALE);
        sheep.userData.body = bodyGroup;
        sheep.userData.head = headGroup;
        sheep.userData.legs = legs;
        sheep.userData.walkCycle = rand() * Math.PI * 2;
        return sheep;
    }

    // Returns true if (x,z) is inside a convex polygon given by ordered points.
    function pointInConvexPoly(x, z, points) {
        let prev = 0;
        for (let i = 0; i < points.length; i++) {
            const a = points[i];
            const b = points[(i + 1) % points.length];
            const cross = (b.x - a.x) * (z - a.z) - (b.z - a.z) * (x - a.x);
            if (cross !== 0) {
                if (prev === 0) prev = cross;
                else if ((cross > 0) !== (prev > 0)) return false;
            }
        }
        return true;
    }

    function createPastureCluster(tileId) {
        const cluster = new THREE.Group();

        // Deterministic RNG per tile.
        let seed = 31337;
        if (typeof tileId === 'number') {
            seed = (tileId * 2971215073) >>> 0;
        } else if (typeof tileId === 'string') {
            for (let i = 0; i < tileId.length; i++) {
                seed = (Math.imul(seed, 19) + tileId.charCodeAt(i)) >>> 0;
            }
        }
        const rand = mulberry32(seed || 1);

        // Sheep wander freely inside the hex, with a small inset so they
        // don't clip past the flat edges. Build the inset hex polygon once
        // and reuse it for both initial placement and per-frame bounds.
        const apothem = hexSize * Math.cos(Math.PI / 6);
        const edgeInset = 1.1;
        const maxEdgeDist = apothem - edgeInset;
        const grazingPoly = [];
        for (let i = 0; i < 6; i++) {
            // Hex corners at angles -30deg + 60deg * i, at distance apothem / cos(30deg)
            // For a pointy-top hex, vertices sit at radius hexSize from center.
            const ang = (-Math.PI / 6) + (i * Math.PI / 3);
            const r = hexSize - edgeInset;
            grazingPoly.push({ x: Math.cos(ang) * r, z: Math.sin(ang) * r });
        }

        // Place 4-6 sheep at deterministic positions inside the hex.
        const sheepCount = 4 + Math.floor(rand() * 3);
        const sampleBound = hexSize - edgeInset;
        for (let i = 0; i < sheepCount; i++) {
            let placed = false;
            let attempts = 0;
            while (!placed && attempts < 40) {
                attempts++;
                const rx = (rand() * 2 - 1) * sampleBound;
                const rz = (rand() * 2 - 1) * sampleBound;
                if (!pointInConvexPoly(rx, rz, grazingPoly)) continue;
                const sheep = buildSheep(rand);
                sheep.position.set(rx, 0, rz);
                sheep.rotation.y = rand() * Math.PI * 2;
                cluster.add(sheep);

                // Pick an initial wander target inside the hex.
                let tx = 0, tz = 0;
                for (let t = 0; t < 20; t++) {
                    const cx = (rand() * 2 - 1) * sampleBound;
                    const cz = (rand() * 2 - 1) * sampleBound;
                    if (pointInConvexPoly(cx, cz, grazingPoly)) {
                        tx = cx; tz = cz; break;
                    }
                }
                // Merge so we keep {body, head, legs, walkCycle} set by buildSheep.
                Object.assign(sheep.userData, {
                    targetX: tx,
                    targetZ: tz,
                    speed: 0.5 + rand() * 0.3,
                    state: rand() < 0.5 ? 'wandering' : 'grazing',
                    timer: 1.5 + rand() * 3.5,
                    grazingPoly,
                    sampleBound,
                    rand
                });
                animatedSheep.push(sheep);
                placed = true;
            }
        }

        return cluster;
    }

    function getHexPixelPos(q, r) {
        const x = hexSize * hexGap * Math.sqrt(3) * (q + r / 2);
        const z = hexSize * hexGap * 3 / 2 * r;
        return { x, z };
    }

    // ======== GEOMETRY ENGINE ========
    function computeTilePositions(tiles) {
        const positions = {};
        for (const tile of tiles) {
            const axial = TILE_AXIAL[tile.id];
            if (axial) positions[tile.id] = getHexPixelPos(axial.q, axial.r);
        }
        return positions;
    }

    function computeVertexPositions(tiles, tilePositions) {
        const samples = {};
        for (const tile of tiles) {
            const center = tilePositions[tile.id];
            if (!center) continue;
            for (let i = 0; i < 6; i++) {
                const vid = tile.vertex_ids[i];
                const angle = (-Math.PI / 6) + (i * Math.PI / 3);
                const vx = center.x + hexSize * Math.cos(angle);
                const vz = center.z + hexSize * Math.sin(angle);
                if (!samples[vid]) samples[vid] = [];
                samples[vid].push({ x: vx, z: vz });
            }
        }
        const positions = {};
        for (const [vid, pts] of Object.entries(samples)) {
            const avgX = pts.reduce((s, p) => s + p.x, 0) / pts.length;
            const avgZ = pts.reduce((s, p) => s + p.z, 0) / pts.length;
            positions[vid] = { x: avgX, z: avgZ };
        }
        return positions;
    }

    function computeEdgePositions(edges, vertexPositions) {
        const positions = {};
        for (const edge of edges) {
            const v1 = vertexPositions[edge.v1];
            const v2 = vertexPositions[edge.v2];
            if (!v1 || !v2) continue;
            positions[edge.id] = {
                x: (v1.x + v2.x) / 2,
                z: (v1.z + v2.z) / 2,
                angle: Math.atan2(v2.z - v1.z, v2.x - v1.x)
            };
        }
        return positions;
    }

    // ======== TOKEN TEXTURE GENERATOR ========
    function createTokenTexture(number) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fdfbf7';
        ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.fill();
        ctx.lineWidth = 4; ctx.strokeStyle = '#222'; ctx.stroke();
        const isRed = number === 6 || number === 8;
        ctx.fillStyle = isRed ? '#d32f2f' : '#222222';
        ctx.font = 'bold 54px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(number.toString(), 64, 60);
        let dots = number <= 7 ? number - 1 : 13 - number;
        ctx.fillStyle = isRed ? '#d32f2f' : '#222222';
        const spacing = 8;
        const startX = 64 - ((dots - 1) * spacing) / 2;
        for (let i = 0; i < dots; i++) {
            ctx.beginPath(); ctx.arc(startX + i * spacing, 95, 3, 0, Math.PI * 2); ctx.fill();
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        dynamicTextures.add(texture);
        return texture;
    }

    function disposeMaterial(material) {
        if (!material) return;
        const materials = Array.isArray(material) ? material : [material];
        for (const mat of materials) {
            if (!mat) continue;
            if (reusableMaterials.has(mat)) continue;
            if (mat.map && dynamicTextures.has(mat.map)) {
                mat.map.dispose();
                dynamicTextures.delete(mat.map);
            }
            mat.dispose();
        }
    }

    function clearBoardGroup() {
        floatingBoats = [];
        animatedSheep = [];
        for (let i = boardGroup.children.length - 1; i >= 0; i--) {
            const obj = boardGroup.children[i];
            boardGroup.remove(obj);
            obj.traverse((child) => {
                if (child.geometry && !reusableGeometries.has(child.geometry)) {
                    child.geometry.dispose();
                }
                if (child.material) {
                    disposeMaterial(child.material);
                }
            });
        }
    }

    // ======== INTERACTION HIGHLIGHTS ========
    function renderInteractionHighlights() {
        const mode = GameState.interactionMode;
        const board = GameState.publicState.board;

        if (mode === 'place_settlement' || mode === 'place_setup_settlement') {
            for (const vertex of board.vertices) {
                if (vertex.building) continue;
                let blocked = false;
                for (const adjId of vertex.adjacent_vertex_ids) {
                    const adj = board.vertices.find(v => v.id === adjId);
                    if (adj && adj.building) { blocked = true; break; }
                }
                if (blocked) continue;
                const pos = GameState.vertexPositions[vertex.id];
                if (!pos) continue;
                const group = new THREE.Group();
                const base = new THREE.Mesh(houseBaseGeo, hlSettlementMat); base.position.y = 0.75;
                const roof = new THREE.Mesh(houseRoofGeo, hlSettlementMat); roof.position.y = 2.25;
                group.add(base, roof);
                group.position.set(pos.x, hexHeight / 2, pos.z);
                group.userData = { type: 'vertex', id: vertex.id };
                boardGroup.add(group);
            }
        } else if (mode === 'place_road' || mode === 'place_setup_road') {
            for (const edge of board.edges) {
                if (edge.road) continue;
                const pos = GameState.edgePositions[edge.id];
                if (!pos) continue;
                const road = new THREE.Mesh(roadGeo, hlRoadMat);
                road.position.set(pos.x, hexHeight / 2 + 0.4, pos.z);
                road.rotation.y = -pos.angle;
                road.userData = { type: 'edge', id: edge.id };
                boardGroup.add(road);
            }
        } else if (mode === 'place_city') {
            for (const vertex of board.vertices) {
                if (!vertex.building || vertex.building.type !== 'settlement') continue;
                if (vertex.building.owner_id !== GameState.myPlayerId) continue;
                const pos = GameState.vertexPositions[vertex.id];
                if (!pos) continue;
                const group = new THREE.Group();
                const base = new THREE.Mesh(cityBaseGeo, hlCityMat); base.position.y = 1;
                const top = new THREE.Mesh(cityTopGeo, hlCityMat); top.position.y = 2.75;
                group.add(base, top);
                group.position.set(pos.x, hexHeight / 2, pos.z);
                group.userData = { type: 'vertex', id: vertex.id };
                boardGroup.add(group);
            }
        } else if (mode === 'move_robber') {
            const robberTileId = board.robber_tile_id;
            for (const tile of board.tiles) {
                if (tile.id === robberTileId) continue;
                const pos = GameState.tilePositions[tile.id];
                if (!pos) continue;
                const marker = new THREE.Mesh(
                    new THREE.CylinderGeometry(3, 3, 0.3, 6),
                    hlRobberMat
                );
                marker.position.set(pos.x, hexHeight / 2 + 0.5, pos.z);
                marker.userData = { type: 'tile', id: tile.id };
                boardGroup.add(marker);
            }
        }
    }

    // ======== SCENE REBUILD ========
    function rebuildScene() {
        clearBoardGroup();
        hideHoverToken();
        GameState.tileNumbers = {};
        const state = GameState.publicState;
        if (!state) return;
        const board = state.board;

        // Compute positions
        GameState.tilePositions = computeTilePositions(board.tiles);
        GameState.vertexPositions = computeVertexPositions(board.tiles, GameState.tilePositions);
        GameState.edgePositions = computeEdgePositions(board.edges, GameState.vertexPositions);

        // Land tiles + tokens
        for (const tile of board.tiles) {
            const pos = GameState.tilePositions[tile.id];
            if (!pos) continue;
            const resource = RESOURCE_MAP[tile.resource] || 'desert';
            renderTile(pos.x, pos.z, resource, tile.number_token, tile.id);
        }

        // Ports
        if (board.ports) {
            for (const port of board.ports) renderPort(port);
        }

        // Robber
        if (board.robber_tile_id !== null && board.robber_tile_id !== undefined) {
            const rpos = GameState.tilePositions[board.robber_tile_id];
            if (rpos) createRobber(rpos.x, rpos.z);
        }

        // Buildings
        for (const vertex of board.vertices) {
            if (!vertex.building) continue;
            const pos = GameState.vertexPositions[vertex.id];
            if (!pos) continue;
            const player = GameState.playerMap[vertex.building.owner_id];
            const colorHex = player ? (PLAYER_COLORS[player.color] || player.color) : '#888';
            if (vertex.building.type === 'settlement') renderSettlement(pos.x, pos.z, colorHex);
            else if (vertex.building.type === 'city') renderCity(pos.x, pos.z, colorHex);
        }

        // Roads
        for (const edge of board.edges) {
            if (!edge.road) continue;
            const pos = GameState.edgePositions[edge.id];
            if (!pos) continue;
            const player = GameState.playerMap[edge.road.owner_id];
            const colorHex = player ? (PLAYER_COLORS[player.color] || player.color) : '#888';
            renderRoad(pos.x, pos.z, pos.angle, colorHex);
        }

        // Interaction highlights
        if (GameState.interactionMode !== 'none') renderInteractionHighlights();
    }

    // ======== HOVER NUMBER TOKEN ========
    // A single reusable token mesh that follows the hovered tile. It lives on the
    // scene (not boardGroup) so it survives scene rebuilds. Textures are cached.
    const tokenTextureCache = {};
    function getTokenTexture(number) {
        if (!tokenTextureCache[number]) {
            const tex = createTokenTexture(number);
            // The token mesh is a cylinder rotated 90deg so its flat face stands
            // vertically. That rotation reorients the disk's UVs sideways, so we
            // rotate the texture back by -90deg here to keep the number upright.
            tex.center.set(0.5, 0.5);
            tex.rotation = Math.PI / 2;
            tex.needsUpdate = true;
            tokenTextureCache[number] = tex;
        }
        return tokenTextureCache[number];
    }
    const hoverTokenMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.5,
        transparent: true,
        opacity: 0.0,
        side: THREE.DoubleSide
    });
    // Pivot group: positioned above the tile, spun around world Y.
    // Inner mesh: the disk-shaped cylinder rotated so it stands vertically
    // (face perpendicular to the pivot's local +Z axis).
    const hoverTokenPivot = new THREE.Group();
    const hoverTokenMesh = new THREE.Mesh(tokenGeom, hoverTokenMat);
    hoverTokenMesh.rotation.x = Math.PI / 2;
    hoverTokenMesh.castShadow = true;
    hoverTokenMesh.receiveShadow = true;
    hoverTokenPivot.add(hoverTokenMesh);
    hoverTokenPivot.visible = false;
    hoverTokenPivot.userData = { currentTileId: null, targetOpacity: 0 };
    scene.add(hoverTokenPivot);

    // Kept for external references (rebuildScene hides via hideHoverToken).
    const hoverToken = hoverTokenPivot;

    // Height above the hex top where the token floats.
    const hoverTokenFloatY = hexHeight / 2 + 4.2;

    function showHoverToken(tileId) {
        const pos = GameState.tilePositions[tileId];
        const number = GameState.tileNumbers[tileId];
        if (!pos || number === undefined) {
            hideHoverToken();
            return;
        }
        if (hoverTokenPivot.userData.currentTileId !== tileId) {
            hoverTokenMat.map = getTokenTexture(number);
            hoverTokenMat.needsUpdate = true;
            hoverTokenPivot.position.set(pos.x, hoverTokenFloatY, pos.z);
            hoverTokenPivot.userData.currentTileId = tileId;
        }
        hoverTokenPivot.visible = true;
        hoverTokenPivot.userData.targetOpacity = 1.0;
    }

    function hideHoverToken() {
        hoverTokenPivot.userData.targetOpacity = 0.0;
        hoverTokenPivot.userData.currentTileId = null;
    }

    const hoverMouse = new THREE.Vector2();
    renderer.domElement.addEventListener('mousemove', (event) => {
        hoverMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        hoverMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(hoverMouse, camera);
        const intersects = raycaster.intersectObjects(boardGroup.children, true);
        for (const hit of intersects) {
            let obj = hit.object;
            while (obj && !obj.userData.type) obj = obj.parent;
            if (!obj || !obj.userData.type) continue;
            if (obj.userData.type === 'tile') {
                showHoverToken(obj.userData.id);
                return;
            }
            // First meaningful hit is not a tile, stop walking intersections.
            break;
        }
        hideHoverToken();
    });
    renderer.domElement.addEventListener('mouseleave', hideHoverToken);

    renderer.domElement.addEventListener('click', (event) => {
        if (GameState.interactionMode === 'none') return;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(boardGroup.children, true);
        for (const hit of intersects) {
            let obj = hit.object;
            while (obj && !obj.userData.type) obj = obj.parent;
            if (!obj || !obj.userData.type) continue;
            handleBoardClick(obj.userData.type, obj.userData.id);
            break;
        }
    });

    async function handleBoardClick(type, id) {
        const mode = GameState.interactionMode;

        if ((mode === 'place_settlement' || mode === 'place_setup_settlement') && type === 'vertex') {
            const cmd = isSetupPhase() ? 'place_setup_settlement' : 'build_settlement';
            const result = await apiCommand(cmd, { vertex_id: id });
            if (result && result.accepted && isSetupPhase()) {
                // After setup settlement, need to place road
                GameState.interactionMode = 'place_setup_road';
                rebuildScene(); updateUI();
            }
        } else if ((mode === 'place_road' || mode === 'place_setup_road') && type === 'edge') {
            const cmd = isSetupPhase() ? 'place_setup_road' : 'build_road';
            await apiCommand(cmd, { edge_id: id });
        } else if (mode === 'place_city' && type === 'vertex') {
            await apiCommand('build_city', { vertex_id: id });
        } else if (mode === 'move_robber' && type === 'tile') {
            GameState.pendingRobberTileId = id;
            const board = GameState.publicState.board;
            const tile = board.tiles.find(t => t.id === id);
            if (tile) {
                const victimIds = new Set();
                for (const vid of tile.vertex_ids) {
                    const vertex = board.vertices.find(v => v.id === vid);
                    if (vertex && vertex.building && vertex.building.owner_id !== GameState.myPlayerId) {
                        victimIds.add(vertex.building.owner_id);
                    }
                }
                if (victimIds.size > 0) {
                    showVictimDialog(id, [...victimIds]);
                } else {
                    await apiCommand('move_robber', { tile_id: id });
                }
            }
        }
    }

    function isSetupPhase() {
        const phase = GameState.publicState?.phase;
        return phase === 'SETUP_1' || phase === 'SETUP_2';
    }

    function isMyTurn() {
        return GameState.publicState?.turn?.current_player_id === GameState.myPlayerId;
    }

    function getLegalActions() {
        return GameState.privateState?.legal_actions || [];
    }

    function hasLegalAction(action) {
        return getLegalActions().includes(action);
    }

    // ======== UI UPDATE ========
    function updateUI() {
        renderPlayerCards();
        renderResourceBar();
        renderActionButtons();
        renderGameStatus();
    }

                + '<div class="flex h-full rounded" style="background:' + bg + '">'

                + '</div>'
                + '<div class="flex items-center p-1 rounded text-white text-xs font-bold space-x-3" style="background:' + bgDark + '">'
                + '<div class="flex items-center"><span class="mr-1">&#127942;</span>' + p.victory_points + '</div>'
                + '<div class="flex items-center"><span class="mr-1">&#9876;&#65039;</span>' + p.played_knights + '</div>'
                + (p.has_longest_road ? '<div class="text-yellow-300 text-[10px]">Road</div>' : '')
                + (p.has_largest_army ? '<div class="text-yellow-300 text-[10px]">Army</div>' : '')
                + '</div></div>'
                + '<div class="w-14 rounded-r flex items-center justify-center overflow-hidden border-l-2" style="background:' + bgMid + ';border-color:' + bgDark + '">'
                + '<div class="text-white text-center text-[10px] font-bold leading-tight">'

    function renderResourceBar() {
        const bar = document.getElementById('resource-bar');
        if (!GameState.privateState) {
            bar.innerHTML = '<span class="text-white text-sm">Waiting for game state...</span>';
            return;
        }
        const res = GameState.privateState.resources;
        const vp = GameState.playerMap[GameState.myPlayerId]?.victory_points ?? 0;

        for (const key of RESOURCE_ORDER) {
            const count = res[key] || 0;
            const color = RESOURCE_COLORS[key];
            html += '<div class="flex items-center space-x-2" title="' + RESOURCE_LABELS[key] + '">'
                + '<div class="w-6 h-6 rounded-sm border border-black shadow" style="background:' + color + '"></div>'
                + '<span class="text-white font-bold text-sm">' + count + '</span></div>';
        }
        html += '<div class="flex items-center space-x-2">'
